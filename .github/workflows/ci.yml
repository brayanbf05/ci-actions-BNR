name: CI BNR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - name: Descarregar el codi
        uses: actions/checkout@v4

      - name: Preparar PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Instal·lar dependències
        run: composer install

      - name: Executar els tests
        run: ./vendor/bin/phpunit --log-junit resultats.xml

      - name: Pujar artefacte resultats-BNR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: resultats-BNR
          path: resultats.xml
